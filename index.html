```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Structure Status</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#1e3a8a,#3b82f6);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
width:100%;
max-width:450px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
padding:30px;
border-radius:20px;
color:#fff;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

h1{
text-align:center;
margin-top:0;
}

label{
display:block;
margin-top:15px;
margin-bottom:8px;
font-weight:bold;
}

select,input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

#msg{
margin-top:15px;
text-align:center;
font-weight:bold;
}

</style>
</head>

<body>

<div class="card">

<h1>🏗 Structure Status</h1>

<label>Select Work</label>

<select id="work" onchange="showVillage()">
<option>Loading...</option>
</select>

<label>Village Name</label>

<input type="text" id="village" readonly>

<label>Status</label>

<select id="status" onchange="toggleImage()">
<option value="To be deleted">🗑 To be deleted</option>
<option value="To be constructed">🚧 To be constructed</option>
</select>

<div id="imageDiv" style="display:none;">

<label>Upload Consent Form *</label>

<input
type="file"
id="photo"
accept="image/*"
capture="environment">

</div>

<button onclick="saveData()">
Submit Entry
</button>

<div id="msg"></div>

</div>

<script>

const api =
"https://script.google.com/macros/s/AKfycby78exG99GS9atmmB9X-Un0NX5eZ8DnIaR1uYUo2HU-1rlrA4AEiMgI7O7h1NnSnpxl/exec";

let works = [];

async function loadWorks(){

try{

const res =
await fetch(api + "?action=list");

works =
await res.json();

let html =
'<option value="">Select Work</option>';

works.forEach(w=>{

html +=
`<option value="${w.name}">
${w.name}
</option>`;

});

document.getElementById("work").innerHTML =
html;

}catch(err){

document.getElementById("work").innerHTML =
'<option>Error Loading</option>';

console.log(err);

}

}

function showVillage(){

const work =
document.getElementById("work").value;

const row =
works.find(x=>x.name===work);

document.getElementById("village").value =
row ? row.village : "";

}

function toggleImage(){

const status =
document.getElementById("status").value;

document.getElementById("imageDiv").style.display =
status === "To be deleted"
? "block"
: "none";

}

function resizeImage(file){

return new Promise(resolve=>{

const reader =
new FileReader();

reader.onload = e=>{

const img =
new Image();

img.onload = ()=>{

const canvas =
document.createElement("canvas");

let w = img.width;
let h = img.height;

if(w > 1200){

h = h * (1200/w);
w = 1200;

}

canvas.width = w;
canvas.height = h;

canvas.getContext("2d")
.drawImage(img,0,0,w,h);

resolve(
canvas.toDataURL(
"image/jpeg",
0.7
)
);

};

img.src = e.target.result;

};

reader.readAsDataURL(file);

});

}

async function saveData(){

const name =
document.getElementById("work").value;

const status =
document.getElementById("status").value;

if(!name){

alert("Select Work");

return;

}

let image = "";

if(status === "To be deleted"){

const file =
document.getElementById("photo").files[0];

if(!file){

alert(
"Consent Form is mandatory"
);

return;

}

image =
await resizeImage(file);

}

document.getElementById("msg").innerHTML =
"Uploading...";

try{

const response =
await fetch(api,{

method:"POST",

body:JSON.stringify({
name:name,
status:status,
image:image
})

});

const result =
await response.json();

if(result.success){

document.getElementById("msg").innerHTML =
"✅ Saved Successfully";

loadWorks();

}else{

document.getElementById("msg").innerHTML =
result.error;

}

}catch(err){

document.getElementById("msg").innerHTML =
err.message;

console.log(err);

}

}

loadWorks();
toggleImage();

</script>

</body>
</html>
