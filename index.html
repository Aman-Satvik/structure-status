<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Structure Status Entry</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;

    background: linear-gradient(
        135deg,
        #0f172a,
        #1e3a8a,
        #2563eb,
        #38bdf8
    );
}

.card{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:35px;
    box-shadow:0 15px 35px rgba(0,0,0,.3);
    color:white;
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo h1{
    font-size:28px;
    margin-bottom:8px;
}

.logo p{
    opacity:.8;
}

label{
    display:block;
    margin-top:18px;
    margin-bottom:8px;
    font-weight:600;
}

select{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    font-size:16px;
    outline:none;
}

input[type="file"]{
    width:100%;
    padding:10px;
    border:none;
    border-radius:12px;
    background:white;
    color:black;
}

button{
    width:100%;
    margin-top:25px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#22c55e;
    color:white;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
    background:#16a34a;
}

#msg{
    margin-top:15px;
    text-align:center;
    font-weight:600;
}

.footer{
    text-align:center;
    margin-top:20px;
    font-size:12px;
    opacity:.8;
    line-height:1.5;
}

</style>
</head>

<body>

<div class="card">

    <div class="logo">
        <h1>🏗 Structure Status</h1>
        <p>Select Structure & Update Status</p>
    </div>

    <label>Select Work</label>

    <select id="name">
        <option value="">Loading...</option>
    </select>

    <label>Status</label>

    <select id="status" onchange="toggleCamera()">

        <option value="To be deleted">
            🗑 To be deleted
        </option>

        <option value="To be constructed">
            🚧 To be constructed
        </option>

    </select>

    <div id="cameraDiv" style="display:none;">

        <label>
            Upload Consent Form
            <span style="color:#ffeb3b;">*</span>
        </label>

        <input
            type="file"
            id="photo"
            accept="image/*"
            capture="environment">

    </div>

    <button onclick="saveData()">
        Submit Entry
    </button>

    <div id="msg"></div>

    <div class="footer">
        PMKSY 2.0 Monitoring Portal<br>
        By Er. Amandeep Godara (AEn, WDSC, Rawatsar)
    </div>

</div>

<script>

const api =
"https://script.google.com/macros/s/AKfycby78exG99GS9atmmB9X-Un0NX5eZ8DnIaR1uYUo2HU-1rlrA4AEiMgI7O7h1NnSnpxl/exec";

async function loadNames(){

    try{

        const res = await fetch(api);

        const names = await res.json();

        let html =
        '<option value="">Select Name</option>';

        names.forEach(name=>{

            html += `
            <option value="${name}">
                ${name}
            </option>`;

        });

        document.getElementById('name').innerHTML =
        html;

    }catch(err){

        console.error(err);

        document.getElementById('name').innerHTML =
        '<option>Error Loading Names</option>';
    }
}

function toggleCamera(){

    const status =
    document.getElementById("status").value;

    document.getElementById("cameraDiv").style.display =
    status === "To be deleted"
    ? "block"
    : "none";
}

function fileToBase64(file){

    return new Promise((resolve,reject)=>{

        const reader = new FileReader();

        reader.onload = () =>
        resolve(reader.result);

        reader.onerror = reject;

        reader.readAsDataURL(file);

    });
}

async function saveData(){

    const name =
    document.getElementById('name').value;

    const status =
    document.getElementById('status').value;

    if(!name){

        alert("Please Select Name");

        return;
    }

    let image = "";

    if(status === "To be deleted"){

        const file =
        document.getElementById("photo").files[0];

        if(!file){

            alert(
            "Photo capture is mandatory for 'To be deleted'"
            );

            return;
        }

        image = await fileToBase64(file);
    }

    document.getElementById("msg").innerHTML =
    "⏳ Uploading... Please wait";

    try{

        await fetch(api,{
            method:"POST",
            body:JSON.stringify({
                name:name,
                status:status,
                image:image
            })
        });

        document.getElementById("msg").innerHTML =
        "✅ Entry Saved Successfully";

        document.getElementById("photo").value = "";

        loadNames();

    }catch(err){

        console.error(err);

        document.getElementById("msg").innerHTML =
        "❌ Error while saving";
    }
}

loadNames();
toggleCamera();

</script>

</body>
</html>
