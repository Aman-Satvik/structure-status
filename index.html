<script>

const api =
"https://script.google.com/macros/s/AKfycby78exG99GS9atmmB9X-Un0NX5eZ8DnIaR1uYUo2HU-1rlrA4AEiMgI7O7h1NnSnpxl/exec";

let workData = [];

async function loadNames(){

    try{

        const res =
        await fetch(api + "?action=details");

        workData = await res.json();

        let html =
        '<option value="">Select Work</option>';

        workData.forEach(item=>{

            html += `
            <option value="${item.name}">
                ${item.name}
            </option>`;
        });

        document.getElementById("name").innerHTML =
        html;

    }catch(err){

        console.error(err);

        document.getElementById("name").innerHTML =
        '<option>Error Loading Data</option>';
    }
}

function showVillage(){

    const selectedWork =
    document.getElementById("name").value;

    const row =
    workData.find(x => x.name === selectedWork);

    document.getElementById("village").value =
    row ? row.village : "";
}

function toggleCamera(){

    const status =
    document.getElementById("status").value;

    document.getElementById("cameraDiv").style.display =
    status === "To be deleted"
    ? "block"
    : "none";
}

function resizeImage(file){

    return new Promise((resolve)=>{

        const reader = new FileReader();

        reader.onload = function(e){

            const img = new Image();

            img.onload = function(){

                const canvas =
                document.createElement("canvas");

                let width = img.width;
                let height = img.height;

                const maxWidth = 1200;

                if(width > maxWidth){

                    height =
                    height * (maxWidth / width);

                    width = maxWidth;
                }

                canvas.width = width;
                canvas.height = height;

                const ctx =
                canvas.getContext("2d");

                ctx.drawImage(
                    img,
                    0,
                    0,
                    width,
                    height
                );

                resolve(
                    canvas.toDataURL(
                        "image/jpeg",
                        0.7
                    )
                );
            };

            img.src = e.target.result;
        };

        reader.readAsDataURL(file);
    });
}

async function saveData(){

    const name =
    document.getElementById("name").value;

    const status =
    document.getElementById("status").value;

    if(!name){

        alert("Please Select Work");

        return;
    }

    let image = "";

    if(status === "To be deleted"){

        const file =
        document.getElementById("photo").files[0];

        if(!file){

            alert(
            "Consent Form is mandatory"
            );

            return;
        }

        image =
        await resizeImage(file);
    }

    document.getElementById("msg").innerHTML =
    "⏳ Uploading... Please wait";

    try{

        const response =
        await fetch(api,{

            method:"POST",

            headers:{
                "Content-Type":
                "application/json"
            },

            body:JSON.stringify({

                name:name,
                status:status,
                image:image

            })
        });

        const result =
        await response.json();

        console.log(result);

        if(result.success){

            document.getElementById("msg").innerHTML =
            "✅ Entry Saved Successfully";

            document.getElementById("photo").value="";

            document.getElementById("village").value="";

            loadNames();

        }else{

            document.getElementById("msg").innerHTML =
            "❌ " + result.error;
        }

    }catch(err){

        console.error(err);

        document.getElementById("msg").innerHTML =
        "❌ Error while saving";
    }
}

loadNames();
toggleCamera();

</script>
