<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Structure Status Entry</title>

<style>

*{ 
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background: linear-gradient(
        135deg,
        #0f172a,
        #1e3a8a,
        #2563eb,
        #38bdf8
    );
}

.card{
    width:420px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:35px;
    box-shadow:0 15px 35px rgba(0,0,0,.3);
    color:white;
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo h1{
    font-size:28px;
    margin-bottom:8px;
}

.logo p{
    opacity:.8;
}

label{
    display:block;
    margin-top:18px;
    margin-bottom:8px;
    font-weight:600;
}

select{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    font-size:16px;
    outline:none;
}

button{
    width:100%;
    margin-top:25px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#22c55e;
    color:white;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
    background:#16a34a;
}

#msg{
    margin-top:15px;
    text-align:center;
    font-weight:600;
}

.footer{
    text-align:center;
    margin-top:20px;
    font-size:12px;
    opacity:.8;
}

</style>
</head>

<body>

<div class="card">

    <div class="logo">
        <h1>🏗 Structure Status</h1>
        <p>Select Structure & Update Status</p>
    </div>

    <label>Select Name</label>

    <select id="name">
        <option>Select Name</option>
    </select>

    <label>Status</label>

    <select id="status">
        <option value="To be deleted">
            🗑 To be deleted
        </option>

        <option value="To be constructed">
            🚧 To be constructed
        </option>
    </select>

    <button onclick="saveData()">
        Submit Entry
    </button>

    <div id="msg"></div>

    <div class="footer">
        PMKSY 2.0 Monitoring Portal By Er. Amandeep Godara (AEn, WDSC, Rawatsar)
    </div>

</div>

<script>

const api="https://script.google.com/macros/s/AKfycby78exG99GS9atmmB9X-Un0NX5eZ8DnIaR1uYUo2HU-1rlrA4AEiMgI7O7h1NnSnpxl/exec";

async function loadNames(){

    const res=await fetch(api);
    const names=await res.json();

    let html='<option value="">Select Name</option>';

    names.forEach(name=>{
        html+=`<option value="${name}">
                ${name}
              </option>`;
    });

    document.getElementById('name').innerHTML=html;
}

async function saveData(){

    let name=document.getElementById('name').value;
    let status=document.getElementById('status').value;

    if(!name){
        alert("Please Select Name");
        return;
    }

    await fetch(api,{
        method:"POST",
        body:JSON.stringify({
            name:name,
            status:status
        })
    });

    document.getElementById("msg").innerHTML=
    "✅ Entry Saved Successfully";

    loadNames();
}

loadNames();

</script>

</body>
</html>
