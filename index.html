<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow:hidden;
position:relative;

background:linear-gradient(
-45deg,
#0f172a,
#1d4ed8,
#06b6d4,
#7c3aed,
#2563eb
);

background-size:400% 400%;
animation:bgMove 15s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Floating Glow Effects */

body::before{
content:"";
position:absolute;
width:350px;
height:350px;
background:#38bdf8;
border-radius:50%;
filter:blur(120px);
top:-100px;
left:-80px;
opacity:.35;
animation:float1 10s ease-in-out infinite;
}

body::after{
content:"";
position:absolute;
width:300px;
height:300px;
background:#8b5cf6;
border-radius:50%;
filter:blur(120px);
bottom:-80px;
right:-60px;
opacity:.35;
animation:float2 12s ease-in-out infinite;
}

@keyframes float1{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(40px);
}
}

@keyframes float2{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-40px);
}
}

.card{

position:relative;
z-index:10;

width:100%;
max-width:520px;

padding:35px;

border-radius:32px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(22px);
-webkit-backdrop-filter:blur(22px);

border:1px solid rgba(255,255,255,.25);

box-shadow:
0 25px 60px rgba(0,0,0,.35),
0 0 35px rgba(255,255,255,.12);

animation:cardEntry .7s ease;
}

@keyframes cardEntry{

from{
opacity:0;
transform:translateY(40px) scale(.95);
}

to{
opacity:1;
transform:translateY(0) scale(1);
}

}

.header{
text-align:center;
margin-bottom:25px;
}

.logo{
font-size:70px;
animation:bounce 3s infinite;
}

@keyframes bounce{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-8px);
}
}

.title{
font-size:34px;
font-weight:800;
color:white;
letter-spacing:.5px;
text-shadow:0 3px 12px rgba(0,0,0,.25);
}

.subtitle{
margin-top:8px;
font-size:14px;
color:rgba(255,255,255,.9);
}
.subtitle1{
margin-top:8px;
font-size:14px;
color:rgba(255,255,255,.9);
}
label{
display:block;
margin-top:18px;
margin-bottom:8px;
font-size:14px;
font-weight:600;
color:white;
}

select,
input[type=text]{

width:100%;
padding:15px;

border-radius:16px;
border:none;

background:rgba(255,255,255,.95);

font-size:15px;
color:#111827;

outline:none;

transition:.3s;
}

select:focus,
input:focus{

transform:translateY(-1px);

box-shadow:
0 0 0 4px rgba(255,255,255,.25),
0 8px 20px rgba(0,0,0,.12);

}

input[type=file]{

width:100%;
padding:14px;

border-radius:16px;

background:rgba(255,255,255,.95);

color:#111827;

border:none;
}

#imageDiv{

margin-top:10px;

padding:14px;

border-radius:18px;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.12);

animation:fadeIn .3s ease;
}

button{

width:100%;

margin-top:24px;

padding:16px;

border:none;

border-radius:16px;

background:linear-gradient(
135deg,
#22c55e,
#16a34a
);

color:white;

font-size:18px;
font-weight:700;

cursor:pointer;

transition:.3s;

box-shadow:
0 12px 25px rgba(34,197,94,.35);
}

button:hover{

transform:
translateY(-3px)
scale(1.01);

box-shadow:
0 20px 35px rgba(34,197,94,.45);

}

button:active{
transform:scale(.98);
}

#msg{

margin-top:18px;

text-align:center;

font-size:15px;
font-weight:700;

color:white;

min-height:24px;
}

.footer{

margin-top:25px;

padding-top:15px;

text-align:center;

font-size:12px;

color:rgba(255,255,255,.85);

border-top:1px solid rgba(255,255,255,.12);

line-height:1.7;
}

@media(max-width:600px){

<body>

<div class="card">
<div class="header">

<div class="logo">
<img src="logo.png" alt="Logo">
 <div style="
display:inline-block;
margin-top:8px;
padding:6px 14px;
border-radius:30px;
background:rgba(255,255,255,.12);
font-size:12px;
color:#dcfce7;">
💧 Water Conservation • 🌱 Environment Protection
</div>
</div>

<div class="title">
PMKSY 2.0
</div>

<div class="subtitle">
Structure Status Monitoring Portal
</div>
<div class="subtitle1">
Created By Er. Aman Godara (AEn, WDSC, Rawatsar)
</div>
</div>
<label>Select Work</label>

<select id="work" onchange="showVillage()">
<option>Loading...</option>
</select>

<label>Village Name</label>

<input type="text" id="village" readonly>

<label>Status</label>

<select id="status" onchange="toggleImage()">
<option value="To be deleted">🗑 To be deleted</option>
<option value="To be constructed">🚧 To be constructed</option>
</select>

<div id="imageDiv" style="display:none;">

<label>Upload Consent Form *</label>

<input
type="file"
id="photo"
accept="image/*"
capture="environment">

</div>

<button onclick="saveData()">
Submit Details
</button>

<div id="msg"></div>

</div>

<script>

const api =
"https://script.google.com/macros/s/AKfycby78exG99GS9atmmB9X-Un0NX5eZ8DnIaR1uYUo2HU-1rlrA4AEiMgI7O7h1NnSnpxl/exec";

let works = [];

async function loadWorks(){

try{

const res =
await fetch(api + "?action=list");

works =
await res.json();

let html =
'<option value="">Select Work</option>';

works.forEach(w=>{

html +=
`<option value="${w.name}">
${w.name}
</option>`;

});

document.getElementById("work").innerHTML =
html;

}catch(err){

document.getElementById("work").innerHTML =
'<option>Error Loading</option>';

console.log(err);

}

}

function showVillage(){

const work =
document.getElementById("work").value;

const row =
works.find(x=>x.name===work);

document.getElementById("village").value =
row ? row.village : "";

}

function toggleImage(){

const status =
document.getElementById("status").value;

document.getElementById("imageDiv").style.display =
status === "To be deleted"
? "block"
: "none";

}

function resizeImage(file){

return new Promise(resolve=>{

const reader =
new FileReader();

reader.onload = e=>{

const img =
new Image();

img.onload = ()=>{

const canvas =
document.createElement("canvas");

let w = img.width;
let h = img.height;

if(w > 1200){

h = h * (1200/w);
w = 1200;

}

canvas.width = w;
canvas.height = h;

canvas.getContext("2d")
.drawImage(img,0,0,w,h);

resolve(
canvas.toDataURL(
"image/jpeg",
0.7
)
);

};

img.src = e.target.result;

};

reader.readAsDataURL(file);

});

}

async function saveData(){

const name =
document.getElementById("work").value;

const status =
document.getElementById("status").value;

if(!name){

alert("Select Work");

return;

}

let image = "";

if(status === "To be deleted"){

const file =
document.getElementById("photo").files[0];

if(!file){

alert(
"Consent Form is mandatory"
);

return;

}

image =
await resizeImage(file);

}

document.getElementById("msg").innerHTML =
"Uploading...";

try{

const response =
await fetch(api,{

method:"POST",

body:JSON.stringify({
name:name,
status:status,
image:image
})

});

const result =
await response.json();

if(result.success){

document.getElementById("msg").innerHTML =
"✅ Saved Successfully";

loadWorks();

}else{

document.getElementById("msg").innerHTML =
result.error;

}

}catch(err){

document.getElementById("msg").innerHTML =
err.message;

console.log(err);

}

}

loadWorks();
toggleImage();

</script>

</body>
