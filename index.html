<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Structure Status</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:
linear-gradient(
135deg,
#0f172a 0%,
#1e3a8a 35%,
#2563eb 70%,
#38bdf8 100%
);
}

.card{
width:100%;
max-width:500px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.18);
padding:35px;
border-radius:28px;
color:#fff;
box-shadow:
0 20px 50px rgba(0,0,0,.35),
0 0 25px rgba(255,255,255,.08);
animation:fadeIn .5s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.header{
text-align:center;
margin-bottom:25px;
}

.logo{
font-size:60px;
margin-bottom:8px;
}

.title{
font-size:32px;
font-weight:700;
}

.subtitle{
font-size:15px;
opacity:.85;
margin-top:6px;
}

label{
display:block;
margin-top:18px;
margin-bottom:8px;
font-weight:600;
font-size:15px;
}

select,
input[type=text]{
width:100%;
padding:15px;
border:none;
border-radius:14px;
font-size:15px;
background:#ffffff;
color:#111827;
outline:none;
}

input[type=file]{
width:100%;
padding:12px;
border:none;
border-radius:14px;
background:#fff;
color:#111827;
}

select:focus,
input:focus{
box-shadow:0 0 0 4px rgba(255,255,255,.25);
}

button{
width:100%;
padding:16px;
margin-top:24px;
border:none;
border-radius:14px;
background:linear-gradient(
135deg,
#22c55e,
#16a34a
);
color:#fff;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:.25s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 12px 25px rgba(34,197,94,.35);
}

button:active{
transform:scale(.98);
}

#imageDiv{
margin-top:10px;
padding:12px;
border-radius:14px;
background:rgba(255,255,255,.08);
}

#msg{
margin-top:18px;
text-align:center;
font-weight:700;
font-size:15px;
}

.footer{
margin-top:25px;
text-align:center;
font-size:12px;
opacity:.85;
line-height:1.6;
padding-top:15px;
border-top:1px solid rgba(255,255,255,.15);
}
</style>
</head>

<body>

<div class="card">

<h1>🏗 Structure Status</h1>

<label>Select Work</label>

<select id="work" onchange="showVillage()">
<option>Loading...</option>
</select>

<label>Village Name</label>

<input type="text" id="village" readonly>

<label>Status</label>

<select id="status" onchange="toggleImage()">
<option value="To be deleted">🗑 To be deleted</option>
<option value="To be constructed">🚧 To be constructed</option>
</select>

<div id="imageDiv" style="display:none;">

<label>Upload Consent Form *</label>

<input
type="file"
id="photo"
accept="image/*"
capture="environment">

</div>

<button onclick="saveData()">
Submit Entry
</button>

<div id="msg"></div>

</div>

<script>

const api =
"https://script.google.com/macros/s/AKfycby78exG99GS9atmmB9X-Un0NX5eZ8DnIaR1uYUo2HU-1rlrA4AEiMgI7O7h1NnSnpxl/exec";

let works = [];

async function loadWorks(){

try{

const res =
await fetch(api + "?action=list");

works =
await res.json();

let html =
'<option value="">Select Work</option>';

works.forEach(w=>{

html +=
`<option value="${w.name}">
${w.name}
</option>`;

});

document.getElementById("work").innerHTML =
html;

}catch(err){

document.getElementById("work").innerHTML =
'<option>Error Loading</option>';

console.log(err);

}

}

function showVillage(){

const work =
document.getElementById("work").value;

const row =
works.find(x=>x.name===work);

document.getElementById("village").value =
row ? row.village : "";

}

function toggleImage(){

const status =
document.getElementById("status").value;

document.getElementById("imageDiv").style.display =
status === "To be deleted"
? "block"
: "none";

}

function resizeImage(file){

return new Promise(resolve=>{

const reader =
new FileReader();

reader.onload = e=>{

const img =
new Image();

img.onload = ()=>{

const canvas =
document.createElement("canvas");

let w = img.width;
let h = img.height;

if(w > 1200){

h = h * (1200/w);
w = 1200;

}

canvas.width = w;
canvas.height = h;

canvas.getContext("2d")
.drawImage(img,0,0,w,h);

resolve(
canvas.toDataURL(
"image/jpeg",
0.7
)
);

};

img.src = e.target.result;

};

reader.readAsDataURL(file);

});

}

async function saveData(){

const name =
document.getElementById("work").value;

const status =
document.getElementById("status").value;

if(!name){

alert("Select Work");

return;

}

let image = "";

if(status === "To be deleted"){

const file =
document.getElementById("photo").files[0];

if(!file){

alert(
"Consent Form is mandatory"
);

return;

}

image =
await resizeImage(file);

}

document.getElementById("msg").innerHTML =
"Uploading...";

try{

const response =
await fetch(api,{

method:"POST",

body:JSON.stringify({
name:name,
status:status,
image:image
})

});

const result =
await response.json();

if(result.success){

document.getElementById("msg").innerHTML =
"✅ Saved Successfully";

loadWorks();

}else{

document.getElementById("msg").innerHTML =
result.error;

}

}catch(err){

document.getElementById("msg").innerHTML =
err.message;

console.log(err);

}

}

loadWorks();
toggleImage();

</script>

</body>
</html>
```
